#
# Flatpak manifest for Cloudy. Targets the GNOME 50 runtime (Fedora 44).
# Build:  flatpak-builder --user --install --force-clean _build/flatpak \
#             io.github.sha5b.Cloudy.yml

id: io.github.sha5b.Cloudy
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: cloudy

finish-args:
  - --share=network
  - --share=ipc
  # Work around WebKitGTK's DMA-BUF renderer painting blank mail bodies.
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # The sync/mount daemons and the Nautilus extension run on the HOST; the app
  # talks to them over the session bus. An app already owns its own ID, so no
  # --talk-name for io.github.sha5b.Cloudy is needed here.
  # rclone FUSE mounts must run on the HOST (a mount made inside the sandbox is
  # invisible to the host file manager), so the app spawns rclone via
  # flatpak-spawn --host. This is a broad permission (host command execution);
  # it is required for host-visible network drives.
  - --talk-name=org.freedesktop.Flatpak
  # Share the real host dirs the mounts + Nautilus sidebar bookmark live in, so
  # host-side rclone mounts there and the host file manager shows the drive.
  - --filesystem=~/.local/share/cloudy:create
  - --filesystem=~/.config/gtk-3.0:create
  # So the app can install its host Nautilus extension on first run.
  - --filesystem=~/.local/share/nautilus-python/extensions:create
  # Secrets use the Secret Service portal (per-app keyring) — no broad hole.

cleanup:
  - '*.a'
  - '*.la'
  - /include
  - /lib/pkgconfig
  - /share/doc

modules:
  # NOTE: blueprint-compiler is NOT built here — the GNOME 48+ SDK already
  # bundles it. Building it from gitlab.gnome.org made every release depend on
  # that host being up (a 503 there once broke the whole Flatpak build), so we
  # rely on the SDK-provided compiler instead.

  # Bundle the rclone static binary so files work with zero host install.
  # (The app also self-provisions rclone rootlessly when not bundled.)
  - name: rclone
    buildsystem: simple
    build-commands:
      - install -Dm755 rclone /app/bin/rclone
    sources:
      - type: archive
        url: https://downloads.rclone.org/v1.74.3/rclone-v1.74.3-linux-amd64.zip
        sha256: dbee7ccd7a5d617e4ed4cd4555c16669b511abfe8d31164f61be35ac9e999bd2
        strip-components: 1

  # Python runtime deps. For a reproducible offline build, replace this with a
  # python3-modules.json of pinned wheels generated by flatpak-pip-generator
  # (req: requirements.txt). This inline form needs network access during build
  # (build-args: --share=network).
  - name: python3-runtime-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation msal Pillow

  - name: cloudy
    buildsystem: meson
    sources:
      - type: dir
        path: .
        # NEVER copy local secrets or build/VCS cruft into the sandbox build.
        # The app reads credentials at runtime (env / GSettings), not from a
        # bundled file — see the security note in docs/SECRETS.md.
        skip:
          - .env
          - .env.example
          - .git
          - _build
          - _install
          - .flatpak-builder
          - po/*.mo
          - po/*.gmo
