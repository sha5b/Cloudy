#
# Flatpak manifest for Cloudy. Targets the GNOME 50 runtime (Fedora 44).
# Build:  flatpak-builder --user --install --force-clean _build/flatpak \
#             com.fiberelements.Cloudy.yml

id: com.fiberelements.Cloudy
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: cloudy

finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # The sync/mount daemons and the Nautilus extension run on the HOST; the app
  # talks to them over the session bus.
  - --talk-name=com.fiberelements.Cloudy
  # Secrets use the Secret Service portal (per-app keyring) — no broad hole.

cleanup:
  - '*.a'
  - '*.la'
  - /include
  - /lib/pkgconfig
  - /share/doc

modules:
  # Blueprint compiler is a build-time dependency (UI compilation).
  - name: blueprint-compiler
    buildsystem: meson
    cleanup:
      - '*'
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/blueprint-compiler.git
        tag: v0.16.0

  # Bundle the rclone static binary so files work with zero host install.
  # (The app also self-provisions rclone rootlessly when not bundled.)
  - name: rclone
    buildsystem: simple
    build-commands:
      - install -Dm755 rclone /app/bin/rclone
    sources:
      - type: archive
        url: https://downloads.rclone.org/v1.74.3/rclone-v1.74.3-linux-amd64.zip
        sha256: dbee7ccd7a5d617e4ed4cd4555c16669b511abfe8d31164f61be35ac9e999bd2
        strip-components: 1

  # Python runtime deps (Graph auth). For a reproducible offline build, replace
  # this with a python3-modules.json of pinned wheels generated by
  # flatpak-pip-generator (req: requirements.txt). This inline form needs
  # network access during build (build-args: --share=network).
  - name: python3-msal
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation msal
    # Stage 6 adds: google-auth-oauthlib google-api-python-client

  - name: cloudy
    buildsystem: meson
    sources:
      - type: dir
        path: .
